  <body>
    <div id="root"></div>
    <script>
      (() => {
        const samples = [
          { src: "/assets/poron1.jpg", label: "샘플 1" },
          { src: "/assets/poron2.jpg", label: "샘플 2" },
        ];

        const createGallery = (compact = false) => {
          const gallery = document.createElement("div");
          gallery.className = `poron-gallery${compact ? " poron-gallery--compact" : ""}`;
          gallery.dataset.poronGallery = "true";

          samples.forEach((sample) => {
            const item = document.createElement("figure");
            item.className = "poron-gallery__item";
            item.style.margin = "0";

            const image = document.createElement("img");
            image.className = "poron-gallery__image";
            image.src = sample.src;
            image.alt = `포론 다이컷 ${sample.label}`;
            image.loading = "lazy";

            const label = document.createElement("figcaption");
            label.className = "poron-gallery__label";
            label.textContent = sample.label;

            item.append(image, label);
            gallery.appendChild(item);
          });

          return gallery;
        };

        const findContainer = (node) => {
          let current = node;

          while (current && current !== document.body) {
            if (
              current instanceof HTMLElement &&
              current.tagName === "DIV" &&
              current.textContent &&
              current.textContent.includes("포론 다이컷") &&
              (
                current.textContent.includes("휴대폰 케이스용 충격방지") ||
                current.textContent.includes("협의 후 조절") ||
                current.children.length > 2
              )
            ) {
              return current;
            }
            current = current.parentElement;
          }

          return null;
        };

        const decoratePoronSections = () => {
          const nameNodes = Array.from(document.querySelectorAll("div, h1, h2, h3, h4, p, span")).filter(
            (node) => node.textContent && node.textContent.trim() === "포론 다이컷"
          );

          nameNodes.forEach((node) => {
            const container = findContainer(node);
            if (!container || container.querySelector("[data-poron-gallery='true']")) {
              return;
            }

            const compact = container.textContent.includes("협의 후 조절");
            container.appendChild(createGallery(compact));
          });
        };

        const removeDetailSections = () => {
          ["사양", "가격표"].forEach((title) => {
            const heading = Array.from(document.querySelectorAll("h1, h2, h3, h4, div, span")).find(
              (node) => node.textContent && node.textContent.trim() === title
            );

            if (!heading) {
              return;
            }

            const section = heading.parentElement;
            if (section instanceof HTMLElement) {
              section.remove();
            }
          });
        };

        const observer = new MutationObserver(() => {
          decoratePoronSections();
          removeDetailSections();
        });

        observer.observe(document.body, { childList: true, subtree: true });
        decoratePoronSections();
        removeDetailSections();
      })();
    </script>
  </body>

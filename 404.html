  <body>
    <div id="root"></div>
    <script>
      (() => {
        const normalizedPath = window.location.pathname.replace(/\/+$/, "") || "/";

        if (normalizedPath === "/detail") {
          const target = `/details${window.location.search}${window.location.hash}`;
          window.location.replace(target);
        }
      })();
    </script>
    <script>
      (() => {
        const TEXT = {
          workSamples: "\uC791\uC5C5 \uC0D8\uD50C",
          sample1: "\uC0D8\uD50C 1",
          sample2: "\uC0D8\uD50C 2",
          sample3: "\uC0D8\uD50C 3",
          spec: "\uC0AC\uC591",
          priceTable: "\uAC00\uACA9\uD45C",
        };

        const samples = [
          { src: "./assets/poron1.jpg", label: TEXT.sample1 },
          { src: "./assets/poron2.jpg", label: TEXT.sample2 },
        ];

        const createGallery = () => {
          const gallery = document.createElement("div");
          gallery.className = "poron-gallery poron-gallery--compact";
          gallery.dataset.poronGallery = "work-samples";

          samples.forEach((sample) => {
            const item = document.createElement("figure");
            item.className = "poron-gallery__item";
            item.style.margin = "0";

            const image = document.createElement("img");
            image.className = "poron-gallery__image";
            image.src = sample.src;
            image.alt = sample.label;
            image.loading = "lazy";

            const label = document.createElement("figcaption");
            label.className = "poron-gallery__label";
            label.textContent = sample.label;

            item.append(image, label);
            gallery.appendChild(item);
          });

          return gallery;
        };

        const findSectionContainer = (node, keywords) => {
          let current = node;

          while (current && current !== document.body) {
            if (
              current instanceof HTMLElement &&
              current.tagName === "DIV" &&
              current.textContent &&
              keywords.every((keyword) => current.textContent.includes(keyword))
            ) {
              return current;
            }
            current = current.parentElement;
          }

          return null;
        };

        const replaceWorkSamples = () => {
          const heading = Array.from(
            document.querySelectorAll("h1, h2, h3, h4, h5, div, span, strong, p")
          ).find((node) => node.textContent && node.textContent.trim() === TEXT.workSamples);

          if (!heading) {
            return;
          }

          const section = findSectionContainer(heading, [TEXT.workSamples, TEXT.sample1]);
          if (!section) {
            return;
          }

          const keepChild = Array.from(section.children).find((child) => child.contains(heading));
          const existingGallery = section.querySelector("[data-poron-gallery='work-samples']");

          if (existingGallery) {
            existingGallery.remove();
          }

          const gallery = createGallery();
          if (keepChild) {
            section.replaceChildren(keepChild, gallery);
          } else {
            section.replaceChildren(gallery);
          }
        };

        const removeDetailSections = () => {
          [TEXT.spec, TEXT.priceTable].forEach((title) => {
            const heading = Array.from(document.querySelectorAll("h1, h2, h3, h4, div, span")).find(
              (node) => node.textContent && node.textContent.trim() === title
            );

            if (!heading) {
              return;
            }

            const section = heading.parentElement;
            if (section instanceof HTMLElement) {
              section.remove();
            }
          });
        };

        const observer = new MutationObserver(() => {
          replaceWorkSamples();
          removeDetailSections();
        });

        observer.observe(document.body, { childList: true, subtree: true });
        replaceWorkSamples();
        removeDetailSections();
      })();
    </script>
  </body>
